<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login</title>

<style>
:root {
    --accent: #7c3aed;
    --weak: #ef4444;
    --medium: #f59e0b;
    --strong: #22c55e;
    --bg-input: rgba(255,255,255,0.06);
}

* {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #0b0b0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* Card */
.container {
    width: 380px;
    background: rgba(15,15,20,0.75);
    backdrop-filter: blur(22px);
    padding: 2.25rem;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
}

/* Header */
h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
}

.subtitle {
    font-size: 0.85rem;
    color: #9ca3af;
    margin-bottom: 2rem;
}

/* Form */
.form-group {
    margin-bottom: 1.25rem;
}

label {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9ca3af;
}

input {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.85rem 1rem;
    border-radius: 14px;
    border: none;
    background: var(--bg-input);
    color: white;
    font-size: 0.95rem;
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

input:focus {
    box-shadow:
        inset 0 0 0 1px rgba(124,58,237,0.7),
        0 0 0 5px rgba(124,58,237,0.15);
}

/* Strength */
.strength-wrapper {
    margin-top: 0.75rem;
}

.strength-bar {
    height: 6px;
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
}

.strength-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    transition: width 0.3s ease, background 0.3s ease;
}

.strength-text {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: #9ca3af;
}

/* Button */
button {
    width: 100%;
    margin-top: 1.75rem;
    padding: 0.9rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 30px rgba(124,58,237,0.35);
}

/* Footer */
.footer {
    margin-top: 1.25rem;
    text-align: center;
    font-size: 0.75rem;
    color: #9ca3af;
}

.footer a {
    color: #a78bfa;
    text-decoration: none;
}
.footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your account</p>

    <form>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" required>

            <div class="strength-wrapper">
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText">
                    Enter a password
                </div>
            </div>
        </div>

        <button type="submit">Log in</button>
    </form>

    <div class="footer">
        Don’t have an account?
        <a href="#">Sign up</a>
    </div>
</div>

<script>
const passwordInput = document.getElementById("password");
const strengthFill = document.getElementById("strengthFill");
const strengthText = document.getElementById("strengthText");

function calculateStrength(password) {
    let score = 0;
    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    return score;
}

passwordInput.addEventListener("input", () => {
    const value = passwordInput.value;
    const strength = calculateStrength(value);

    if (!value) {
        strengthFill.style.width = "0%";
        strengthFill.style.background = "transparent";
        strengthText.textContent = "Enter a password";
        strengthText.style.color = "#9ca3af";
        return;
    }

    if (strength <= 1) {
        strengthFill.style.width = "25%";
        strengthFill.style.background = "var(--weak)";
        strengthText.textContent = "Weak password";
        strengthText.style.color = "var(--weak)";
    } else if (strength === 2) {
        strengthFill.style.width = "50%";
        strengthFill.style.background = "var(--medium)";
        strengthText.textContent = "Medium strength";
        strengthText.style.color = "var(--medium)";
    } else if (strength === 3) {
        strengthFill.style.width = "75%";
        strengthFill.style.background = "var(--strong)";
        strengthText.textContent = "Strong password";
        strengthText.style.color = "var(--strong)";
    } else {
        strengthFill.style.width = "100%";
        strengthFill.style.background = "linear-gradient(90deg,#22c55e,#16a34a)";
        strengthText.textContent = "Very strong password";
        strengthText.style.color = "#22c55e";
    }
});
</script>

</body>
</html>
